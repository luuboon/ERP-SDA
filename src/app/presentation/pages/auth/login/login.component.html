<p-toast />

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-logo pi pi-objects-column"></span>
            <h1 class="auth-title">Bienvenido a ERP-Luu</h1>
            <p class="auth-subtitle">Inicia sesión para acceder a tu panel</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="field">
                <label for="email" class="field-label">Correo electrónico</label>
                <input pInputText id="email" formControlName="email" class="w-full" placeholder="ejemplo@empresa.com"
                    [invalid]="loginForm.controls['email'].invalid && loginForm.controls['email'].touched" />
                @if (loginForm.controls['email'].invalid && loginForm.controls['email'].touched) {
                <small class="error-text">El correo es requerido y debe ser válido.</small>
                }
            </div>

            <div class="field">
                <label for="password" class="field-label">Contraseña</label>
                <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false"
                    styleClass="w-full" inputStyleClass="w-full" placeholder="Ingresa tu contraseña" />
            </div>

            <div class="form-options">
                <div class="checkbox-container">
                    <p-checkbox binary="true" inputId="remember"></p-checkbox>
                    <label for="remember" class="checkbox-label">Recuérdame</label>
                </div>
                <a href="#" class="forgot-link" (click)="$event.preventDefault()">¿Olvidaste tu contraseña?</a>
            </div>

            <p-button label="Iniciar Sesión" icon="pi pi-sign-in" severity="contrast" type="submit"
                [disabled]="loginForm.invalid" styleClass="w-full auth-btn" />
        </form>

        <div class="auth-footer">
            <span>¿No tienes una cuenta?</span>
            <a routerLink="/auth/register" class="auth-link">Regístrate</a>
        </div>
    </div>
</div>
