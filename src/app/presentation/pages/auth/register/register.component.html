<p-toast position="top-right" />

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-logo pi pi-objects-column"></span>
            <h1 class="auth-title">Crea tu cuenta</h1>
            <p class="auth-subtitle">Regístrate para comenzar a usar ERP-Luu</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="field">
                <label for="rname" class="field-label">Nombre completo</label>
                <input pInputText id="rname" formControlName="name" class="w-full" placeholder="Ej. Ana García"
                    [invalid]="registerForm.controls['name'].invalid && registerForm.controls['name'].touched" />
            </div>

            <div class="field">
                <label for="remail" class="field-label">Correo electrónico</label>
                <input pInputText id="remail" formControlName="email" class="w-full" placeholder="ejemplo@empresa.com"
                    [invalid]="registerForm.controls['email'].invalid && registerForm.controls['email'].touched" />
            </div>

            <div class="field">
                <label for="rpassword" class="field-label">Contraseña</label>
                <p-password id="rpassword" formControlName="password" [toggleMask]="true" [feedback]="true"
                    styleClass="w-full" inputStyleClass="w-full" placeholder="Al menos 4 caracteres" />
            </div>

            <div class="field">
                <label for="rconfirm" class="field-label">Confirmar contraseña</label>
                <p-password id="rconfirm" formControlName="confirmPassword" [toggleMask]="true" [feedback]="false"
                    styleClass="w-full" inputStyleClass="w-full" placeholder="Repite la contraseña" />
            </div>

            <p-button label="Crear cuenta" icon="pi pi-user-plus" severity="contrast" type="submit"
                [disabled]="registerForm.invalid" styleClass="w-full auth-btn" />
        </form>

        <div class="auth-footer">
            <span>¿Ya tienes cuenta?</span>
            <a routerLink="/auth/login" class="auth-link">Inicia sesión</a>
        </div>
    </div>
</div>
